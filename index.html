<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チョモランマ！山本くん</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');

  :root {
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --accent: #FF6B35;
    --accent2: #FFB347;
    --blue: #4ECDC4;
    --text: #2D1B0E;
    --subtext: #8B6F5E;
    --border: #F0DDD0;
    --shadow: rgba(255,107,53,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito','Zen Kaku Gothic New',sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 20%, #FFE4CC 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, #E0F7F5 0%, transparent 50%);
  }
  header {
    max-width: 420px;
    margin: 0 auto;
    padding: clamp(10px, 3vw, 16px) clamp(8px, 3vw, 12px) clamp(6px, 1.5vw, 10px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .countdown {
    text-align: center;
    font-weight: 900;
    color: var(--accent);
    font-size: clamp(0.9rem, 3.8vw, 1.2rem);
    text-shadow: 2px 2px 0 #FFE4CC;
    line-height: 1.2;
  }
  .countdown .countdown-days {
    font-size: clamp(1.5rem, 6.5vw, 2.2rem);
    margin: 0 4px;
  }

  .game-wrap {
    max-width: 420px; margin: 0 auto;
    padding: 0 clamp(8px, 3vw, 12px) clamp(40px, 12vw, 80px);
    display: flex; flex-direction: column; gap: clamp(10px, 2.5vw, 14px);
  }

  .char-card {
    background: var(--card); border-radius: 24px; padding: 16px;
    box-shadow: 0 8px 32px var(--shadow); border: 2px solid var(--border);
    position: relative; overflow: hidden;
  }
  .char-card::before {
    content:''; position:absolute; top:-30px; right:-30px;
    width:100px; height:100px;
    background:radial-gradient(circle,#FFE4CC 0%,transparent 70%); border-radius:50%;
  }
  .char-status {
    text-align:center; font-weight:800; font-size:1.05rem;
    color:white; padding:4px 18px; border-radius:20px; margin-bottom:18px;
    align-self:center;
  }
  .char-status.resting  { background:#22C55E; }
  .char-status.waiting  { background:#9CA3AF; }
  .char-status.down     { background:#EF4444; }
  .char-status.training { background:#3B82F6; animation:statusPulse 2s ease-in-out infinite; }
  .char-status.gameend  { background:#FFC107; color:#FFFFFF; }
  @keyframes statusPulse {
    0%,100% { opacity:1; }
    50%      { opacity:0.5; }
  }
  .char-bottom-row { display:flex; align-items:center; gap:16px; margin-top:-6px; position:relative; }
  .char-level {
    background:var(--accent); color:white;
    font-weight:800; font-size:0.8rem; padding:3px 10px; border-radius:20px;
    display:flex; align-items:center; gap:4px; white-space:nowrap; flex-shrink:0;
    position:relative;
  }
  .level-num { min-width:2.5em; text-align:right; }
  .char-area { display:flex; align-items:flex-start; gap:clamp(6px,2vw,12px); position:relative; }
  .char-svg-wrap { flex-shrink:0; width:clamp(110px, 36vw, 150px); height:clamp(160px, 52vw, 220px); position:relative; margin-top:6px; }
  #charSvg { width:100%; height:100%; overflow:visible; }

  .char-stats {
    flex: 1;
    min-width: 0;
    margin-top: clamp(44px, 13vw, 64px);
    margin-right: clamp(10px, 4vw, 20px);
    display: flex;
    flex-direction: column;
    gap: clamp(5px, 1.5vw, 7px);
    position: relative;
  }

  /* セリフ吹き出し */
  .speech-bubble {
    position: absolute;
    top: clamp(6px, 2vw, 8px);
    left: calc(clamp(110px, 36vw, 150px) - 5px);
    right: clamp(12px, 4vw, 24px);
    background: #FFFFFF;
    border: 2px solid var(--accent2);
    border-radius: 14px;
    padding: clamp(4px, 1.5vw, 6px) clamp(8px, 2.5vw, 10px);
    font-size: clamp(0.7rem, 2.6vw, 0.78rem);
    font-weight: 700;
    color: var(--accent);
    line-height: 1.3;
    white-space: nowrap;
  }
  /* 三角の尻尾(外側 = 枠線色) */
  .speech-bubble::before {
    content: '';
    position: absolute;
    left: -15px;
    top: 50%;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 6.4px solid transparent;
    border-bottom: 6.4px solid transparent;
    border-right: 15px solid var(--accent2);
  }
  /* 三角の尻尾(内側 = 背景色で上書き) */
  .speech-bubble::after {
    content: '';
    position: absolute;
    left: -10.5px;
    top: 50%;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 4.8px solid transparent;
    border-bottom: 4.8px solid transparent;
    border-right: 12px solid #FFFFFF;
  }
  .speech-bubble.resting {
    background: #FFFFFF;
    border-color: var(--blue);
    color: #0D9488;
  }
  .speech-bubble.resting::before { border-right-color: var(--blue); }
  .speech-bubble.resting::after  { border-right-color: #FFFFFF; }
  .speech-bubble.gameend {
    background: #FFF176;
    border-color: #F9A825;
    color: #FFFFFF;
    font-weight: 900;
  }
  .speech-bubble.gameend::before { border-right-color: #F9A825; }
  .speech-bubble.gameend::after  { border-right-color: #FFF176; }
  .stat-row { display:flex; flex-direction:column; gap:2px; }
  .stat-label { font-size:0.72rem; font-weight:700; color:var(--subtext); display:flex; gap:8px; }
  .stat-label span:first-child { width:2em; }
  .stat-label span:last-child  { min-width:2.5em; text-align:right; }
  .stat-bar { height:8px; background:transparent; border-radius:4px; overflow:hidden; }
  .stat-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }

  /* キャラカード内のライフバー (アイコン + バーのみ) */
  .life-inline {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .life-inline .life-icon { font-size: 1rem; line-height: 1; }
  .life-bar-outer { flex:1; }
  .life-inline .life-bar-wrap { height: 14px; background:#F0E8E0; border-radius:7px; overflow:hidden; position:relative; transition:width 0.3s ease; }

  /* タイトル画面 */
  .title-panel {
    position: absolute;
    top: clamp(8px, 2.5vw, 14px);
    left: calc(clamp(110px, 36vw, 150px) + clamp(6px, 2vw, 12px));
    right: clamp(10px, 4vw, 20px);
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(6px, 2vw, 10px);
    text-align: center;
    pointer-events: none;
  }
  .title-panel > * { pointer-events: auto; }
  .title-logo {
    font-weight: 900;
    font-size: clamp(0.9rem, 4vw, 1.3rem);
    color: var(--accent);
    text-shadow: 2px 2px 0 #FFE4CC;
    line-height: 1.1;
  }
  .title-logo .top { font-size: 0.7em; display: block; }
  .title-desc {
    font-size: clamp(0.75rem, 2.8vw, 0.9rem);
    color: var(--subtext);
    line-height: 1.4;
    font-weight: 700;
  }
  .title-start-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 20px;
    padding: clamp(8px, 2.6vw, 12px) clamp(21px, 6.5vw, 31px);
    font-weight: 900;
    font-size: clamp(1.1rem, 4.2vw, 1.3rem);
    cursor: pointer;
    box-shadow: 0 4px 0 #D9521F;
    transition: transform 0.1s, box-shadow 0.1s;
    margin-top: 4px;
  }
  .title-start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #D9521F; }
  .title-start-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #D9521F; }
  .title-panel { display: none; }
  .title-active .title-panel { display: flex; }
  /* タイトル中は非表示にする要素（領域は保持） */
  .title-active .speech-bubble,
  .title-active .char-stats,
  .title-active .char-bottom-row {
    visibility: hidden;
  }
  .title-active #charStatus {
    visibility: hidden;
  }
  /* タイトル中のメニューカードはグレーアウト */
  .menu-card.title-disabled {
    opacity: 0.45;
    filter: grayscale(0.5);
    pointer-events: none;
  }

  .life-section {
    background:var(--card); border-radius:18px; padding:14px 16px;
    box-shadow:0 4px 16px var(--shadow); border:2px solid var(--border);
  }
  .life-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .life-label { font-weight:800; font-size:0.9rem; }
  .life-val { font-size:0.85rem; font-weight:700; color:var(--subtext); }
  .life-bar-wrap { height:18px; background:#F0E8E0; border-radius:9px; overflow:hidden; position:relative; }
  #lifeBar { height:100%; background:linear-gradient(90deg,#4ADE80,#22C55E); border-radius:9px; transition:width 0.3s ease,background 0.3s; }
  .bar-shine { position:absolute; top:3px; left:5px; width:40%; height:5px; background:rgba(255,255,255,0.5); border-radius:3px; pointer-events:none; }

  .status-badge {
    display:inline-flex; align-items:center; gap:5px;
    background:#FFF0E8; border:2px solid var(--accent2); border-radius:20px;
    padding:4px 12px; font-weight:800; font-size:0.8rem; color:var(--accent); margin-top:8px; transition:all 0.3s;
  }
  .status-badge.resting { background:#E0F7F5; border-color:var(--blue); color:#0D9488; }
  .status-badge .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1s infinite; }
  .status-badge.resting .dot { background:var(--blue); }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.7} }

  .log-wrap {
    background:var(--card); border-radius:18px; padding:12px 14px;
    box-shadow:0 4px 16px var(--shadow); border:2px solid var(--border);
    font-size:0.8rem; min-height:50px; max-height:80px; overflow-y:auto; color:var(--subtext);
  }
  .log-line { margin-bottom:2px; }
  .log-line.new { color:var(--accent); font-weight:700; }

  .section-title { font-weight:900; font-size:1rem; color:var(--text); padding-left:4px; }
  .section-title-row { display:flex; align-items:center; justify-content:space-between; }
  .rest-btn {
    background:#E0F7F5; border:2px solid var(--blue); border-radius:20px;
    color:#0D9488; font-weight:800; font-size:0.8rem; padding:4px 14px;
    cursor:pointer; transition:all 0.2s;
  }
  .rest-btn:hover { background:#B2EFE9; }
  .rest-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .menu-card {
    background:var(--card);
    border-radius:18px;
    padding:14px 12px;
    box-shadow:0 4px 16px var(--shadow);
    border:2px solid var(--border);
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .menu-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:clamp(4px, 1.5vw, 8px); }
  .menu-btn {
    background:#FFF8F0;
    border:2px solid var(--border);
    border-radius:14px;
    padding:clamp(4px, 1vw, 6px) clamp(2px, 0.5vw, 4px) clamp(6px, 2vw, 8px);
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:clamp(2px, 1vw, 4px);
    transition:all 0.2s;
    box-shadow:0 2px 6px var(--shadow);
    position:relative;
    overflow:hidden;
    user-select:none;
  }
  .menu-btn:hover { transform:translateY(-2px); box-shadow:0 6px 14px var(--shadow); }
  .menu-btn:active { transform:translateY(0); }
  .menu-btn.active { border-color:var(--accent); background:linear-gradient(135deg,#FFF0E8,#FFE8D6); box-shadow:0 4px 14px rgba(255,107,53,0.3); }
  .menu-btn.disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }
  .menu-icon { font-size:2rem; line-height:1; }
  .menu-icon-img {
    width: 100%;
    max-width: clamp(60px, 19vw, 90px);
    height: auto;
    aspect-ratio: 1 / 1;
    object-fit: contain;
    display: block;
  }
  .menu-name { font-weight:800; font-size:clamp(0.7rem, 2.5vw, 0.85rem); color:var(--text); }

  /* ゲーム終了後リザルト */
  .result-wrap {
    display:flex; flex-direction:column; align-items:center; gap:10px;
    padding:4px 0;
    animation:resultFadeIn 0.7s ease forwards;
  }
  @keyframes resultFadeIn {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .result-header {
    font-size:0.8rem; font-weight:800; color:var(--subtext); letter-spacing:3px;
  }
  .result-score-label {
    font-size:0.78rem; font-weight:700; color:var(--subtext); margin-bottom:-4px;
  }
  .result-score {
    font-size:1.8rem; font-weight:900; color:var(--accent);
    text-shadow:1px 2px 0 #FFE4CC;
  }
  .result-score-label, .result-title-label {
    font-size:0.72rem; font-weight:700; color:var(--subtext);
    letter-spacing:1px; margin-bottom:-6px;
  }
  .result-title {
    font-size:1.5rem; font-weight:900; color:var(--accent);
    text-shadow:1px 2px 0 #FFE4CC;
  }

  .total-card {
    background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:18px;
    padding:14px 16px; color:white; display:flex; justify-content:space-between;
    align-items:center; box-shadow:0 6px 20px rgba(255,107,53,0.3);
  }
  .total-card .label { font-size:0.85rem; font-weight:700; opacity:0.9; }
  .total-card .value { font-size:1.6rem; font-weight:900; }

  .popup {
    position:fixed; bottom:30px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--text); color:white; border-radius:20px;
    padding:10px 20px; font-weight:700; font-size:0.9rem;
    opacity:0; pointer-events:none; transition:all 0.3s; z-index:100; white-space:nowrap;
  }
  .popup.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @keyframes floatUp {
    0%   { opacity:1; transform:translateY(0) scale(1); }
    100% { opacity:0; transform:translateY(-50px) scale(1.4); }
  }
  @keyframes floatUpShort {
    0%   { opacity:1; transform:translateY(0); }
    50%  { opacity:1; transform:translateY(-17px); }
    100% { opacity:0; transform:translateY(-17px); }
  }
  .float-text {
    position:absolute; font-weight:900; font-size:1.1rem;
    color:var(--accent); pointer-events:none;
    animation:floatUp 0.9s ease forwards; z-index:10;
  }
  .float-text-stat {
    position:absolute; font-weight:900; font-size:1.1rem;
    pointer-events:none;
    animation:floatUpShort 0.9s ease forwards; z-index:10;
  }
  .float-text-stat.sparkle-glow {
    text-shadow:
      0 0 4px #FFE066,
      0 0 8px #FFD24A,
      0 0 12px rgba(255, 210, 74, 0.7);
    filter: drop-shadow(0 0 3px rgba(255, 220, 100, 0.9));
  }
  .float-text-stat.dull-effect {
    filter: grayscale(0.85) brightness(0.55);
    text-shadow: 0 2px 5px rgba(0,0,0,0.45);
  }
  .float-dull {
    position: absolute;
    font-size: 13px;
    pointer-events: none;
    z-index: 11;
    animation: dullDrop 1.0s ease-out forwards;
  }
  @keyframes dullDrop {
    0%   { opacity: 0; transform: scale(0.6) translateY(0); }
    30%  { opacity: 0.8; transform: scale(1.0) translateY(0); }
    100% { opacity: 0; transform: scale(0.9) translateY(10px); }
  }
  .float-sparkle {
    position: absolute;
    font-size: 12px;
    pointer-events: none;
    z-index: 11;
    animation: sparkleBurst 0.9s ease-out forwards;
  }
  @keyframes sparkleBurst {
    0%   { opacity: 0; transform: scale(0.4) rotate(0deg); }
    30%  { opacity: 1; transform: scale(1.2) rotate(60deg); }
    100% { opacity: 0; transform: scale(0.8) translateY(-20px) rotate(180deg); }
  }
  @keyframes levelupFloat {
    0%   { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
    100% { opacity:0; transform:translateX(-50%) translateY(-40px) scale(1.1); }
  }
  .levelup-float {
    position:absolute; left:50%; bottom:0;
    font-weight:900; font-size:1rem;
    color:var(--accent2); pointer-events:none; white-space:nowrap;
    animation:levelupFloat 0.9s ease forwards; z-index:20;
  }

  /* 調子エフェクト */
  .dull { font-size: 13.5px; }
  .fx-bad { transition: opacity 0.4s ease; }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .levelup-overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    z-index:500; pointer-events:all;
  }
  .levelup-banner {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px;
    background:var(--accent);
    border-radius:50%;
    box-shadow:0 5px 0 #C04010, 0 8px 28px rgba(255,107,53,0.55);
    animation:levelupIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .levelup-main {
    font-size:1.3rem; font-weight:900;
    color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,0.25);
    letter-spacing:0.5px;
  }
  .levelup-lv {
    font-size:2rem; font-weight:900; color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,0.25);
    letter-spacing:1px;
  }
  @keyframes levelupIn {
    0%   { opacity:0; transform:scale(0.5); }
    100% { opacity:1; transform:scale(1); }
  }
  @keyframes levelupBurst {
    0%   { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(1.2); }
  }
  .levelup-banner.burst { animation:levelupBurst 0.45s ease forwards; }
  .levelup-banner.gameend {
    background: #2563EB;
    box-shadow: 0 5px 0 #1E40AF, 0 8px 28px rgba(37,99,235,0.55);
  }
  .levelup-banner.gameend .levelup-main {
    font-size: 1.2rem;
  }
</style>
</head>
<body class="title-active">

<header>
  <div class="countdown" id="countdownText">
    大会まで残り<span class="countdown-days" id="countdownDays">120</span>日！
  </div>
</header>

<div class="game-wrap">

  <!-- Character Card -->
  <div class="char-card">
    <div class="char-status resting" id="charStatus">休憩中…</div>
    <div class="char-area">
      <div class="char-svg-wrap" id="charWrap">
        <!--
          SVG viewBox: 0 0 100 200
          全パーツはJS側からrx/ryのみ変更。cx/cyは固定。
          コネクタ矩形が首・腰をカバーして隙間を埋める。
          描画順（下から上）: カーフ→太もも→パンツ→前腕→上腕→胴体→胸→肩→首→頭
        -->
        <svg id="charSvg" viewBox="0 0 100 215" xmlns="http://www.w3.org/2000/svg">
          <!--
          ═══════════════════════════════════════════════════════
          画像2のシンプルな構造を再現:
            - 頭 / 首 / 肩 / 一体の胴体 / 上腕 / 前腕 / 太もも / ふくらはぎ
            - 関節球はなし。各楕円が重なる or 少し離れて関節感を出す
            - 肌色一色 (#F0C898) / 枠線なし
          ═══════════════════════════════════════════════════════
          -->

          <defs>
            <!-- 部位ごとの筋肉パーツ用グラデーション (JSで stat に応じて色変更) -->
            <radialGradient id="gMuscleChest" cx="40%" cy="35%" r="65%">
              <stop id="muscleChestStop1" offset="0%"  stop-color="#F0C898"/>
              <stop id="muscleChestStop2" offset="100%" stop-color="#F0C898"/>
            </radialGradient>
            <radialGradient id="gMuscleArm" cx="40%" cy="35%" r="65%">
              <stop id="muscleArmStop1" offset="0%"  stop-color="#F0C898"/>
              <stop id="muscleArmStop2" offset="100%" stop-color="#F0C898"/>
            </radialGradient>
            <radialGradient id="gMuscleAbs" cx="40%" cy="35%" r="65%">
              <stop id="muscleAbsStop1" offset="0%"  stop-color="#F0C898"/>
              <stop id="muscleAbsStop2" offset="100%" stop-color="#F0C898"/>
            </radialGradient>
            <radialGradient id="gMuscleLeg" cx="40%" cy="35%" r="65%">
              <stop id="muscleLegStop1" offset="0%"  stop-color="#F0C898"/>
              <stop id="muscleLegStop2" offset="100%" stop-color="#F0C898"/>
            </radialGradient>
          </defs>

          <g fill="#F0C898" stroke="none">

            <!-- 太もも (付け根が内側・膝が外側=ハの字) -->
            <ellipse cx="38" cy="133" rx="8" ry="20" transform="rotate(12 38 133)"/>
            <ellipse cx="62" cy="133" rx="8" ry="20" transform="rotate(-12 62 133)"/>

// ============================================================
// lerp helper
// ============================================================
function lerp(a, b, t) { return a + (b - a) * Math.min(Math.max(t, 0), 1); }

// 色のlerp (#RRGGBB 形式)
function lerpColor(a, b, t) {
  t = Math.min(Math.max(t, 0), 1);
  const ah = parseInt(a.slice(1), 16);
  const bh = parseInt(b.slice(1), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const b2 = Math.round(ab + (bb - ab) * t);
  return `rgb(${r},${g},${b2})`;
}

// ============================================================

// 筋肉サイズ用比率（レベルアップ時のみ使用）
function muscleR(val) {
  if (val <= 100) return val / 100;
  if (val <= 130) return 1.0 + (val - 100) / 300;
  return 1.1;
}

function calcMuscleSizes() {
  const s = state.stats;

    'm-pec-l':      { rx: lerp(6.6,  15.6,  c), ry: lerp(8.8,   21.12, c) },

function applyMuscleSizes(scale = 1.0) {

function animateLifeBarWidth(fromPct, toPct, fromFill, toFill, duration) {
  lifeBarWrap.style.transition = 'none';
  lifeBar.style.transition = 'none';
  let startTs = null;
  function tick(ts) {
    if (!startTs) startTs = ts;
    const p = Math.min((ts - startTs) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 2);
    const curPct  = fromPct  + (toPct  - fromPct)  * eased;
    const curFill = fromFill + (toFill - fromFill) * eased;
    lifeBarWrap.style.width = curPct.toFixed(2) + '%';
    lifeBar.style.width = curFill.toFixed(2) + '%';
    if (p < 1) {
      requestAnimationFrame(tick);
    } else {
      lifeBarWrap.style.transition = '';
      lifeBar.style.transition = '';
    }
  }
  requestAnimationFrame(tick);
}

  const peak = {};
  ids.forEach(id => {
    peak[id] = { rx: to[id].rx * 1.1, ry: to[id].ry * 1.1 };
  });
  let startTs = null;
  function tick(ts) {
    if (!startTs) startTs = ts;
    const p = Math.min((ts - startTs) / duration, 1);
    // 前半 (0〜0.6): from → peak (+10%)、後半 (0.6〜1.0): peak → to
    let phase, t, a, b;
    if (p < 0.6) {
      phase = p / 0.6;       // 0〜1
      t = 1 - Math.pow(1 - phase, 2); // ease-out
      a = from; b = peak;
    } else {
      phase = (p - 0.6) / 0.4; // 0〜1
      t = 1 - Math.pow(1 - phase, 2); // ease-out
      a = peak; b = to;
    }
    ids.forEach(id => {
      const el = document.getElementById(id);
      el.setAttribute('rx', (a[id].rx + (b[id].rx - a[id].rx) * t).toFixed(2));
      el.setAttribute('ry', (a[id].ry + (b[id].ry - a[id].ry) * t).toFixed(2));
      el.setAttribute('opacity', '1');
    });
    if (p < 1) { _muscleAnimRAF = requestAnimationFrame(tick); }
    else { _muscleAnimRAF = null; onComplete && onComplete(); }
  }
  _muscleAnimRAF = requestAnimationFrame(tick);
}

function updateCharacter() {
  const s = state.stats;
  const valR = (val) => val / MAX_STAT_VAL;
  const chestR = valR(s.chest), armR = valR(s.arm), absR = valR(s.abs), legR = valR(s.leg);
  const avgR = (chestR + armR + absR + legR) / 4;

  // 筋肉の色
  const applyColor = (id1, id2, ratio) => {
    document.getElementById(id1).setAttribute('stop-color', lerpColor('#F0C898', '#F8DEB8', ratio));
    document.getElementById(id2).setAttribute('stop-color', lerpColor('#F0C898', '#A85C20', ratio));
  };
  applyColor('muscleChestStop1', 'muscleChestStop2', chestR);
  applyColor('muscleArmStop1',   'muscleArmStop2',   armR);
  applyColor('muscleAbsStop1',   'muscleAbsStop2',   absR);
  applyColor('muscleLegStop1',   'muscleLegStop2',   legR);

  // 汗
  const isTraining = !!state.activeMenu;
  document.getElementById('sweat-group').setAttribute('opacity', isTraining ? '1' : '0');

  // 口：成長で笑顔が深くなる
  const smileDepth = lerp(3, 6, avgR);
  document.getElementById('mouth').setAttribute('d',
    `M46 39 Q50 ${(39 + smileDepth).toFixed(1)} 54 39`
  );
}

function setMuscle(id, rx, ry, statRatio) {
  const el = document.getElementById(id);
  if (!el) return;
  el.setAttribute('rx', rx.toFixed(2));
  el.setAttribute('ry', ry.toFixed(2));
  // opacity: stat 5%あたりからフェードイン、30%で完全表示
  const op = Math.max(0, Math.min(1, (statRatio - 0.05) / 0.25));
  el.setAttribute('opacity', op.toFixed(2));
}

function calcLevel() {
  const total = Object.values(state.stats).reduce((a, v) => a + v, 0);
  return Math.floor(total / 50) + 1;
}

function generateTitle() {
  const s = state.stats;
  const entries = [
    { val: s.chest, prefix: '胸筋' },
    { val: s.arm,   prefix: '腕'   },
    { val: s.abs,   prefix: '腹筋' },
    { val: s.leg,   prefix: '脚'   },
  ];
  const maxVal = Math.max(...entries.map(e => e.val));
  const minVal = Math.min(...entries.map(e => e.val));

  const isBalanced = (maxVal - minVal <= 30) || (minVal >= 90) || (maxVal < 50);
  if (isBalanced) {
    // バランス型：全部位の最低値で判定
    if (minVal >= 90) return 'チョモランマ！';
    if (minVal >= 80) return 'でかすぎ警報！';
    if (minVal >= 70) return 'よっ阿修羅像！';
    if (minVal >= 60) return '仕上がってるね！';
    if (minVal >= 50) return 'ナイスバルク！';
    if (minVal >= 40) return 'でかいよ！';
    if (minVal >= 30) return '育ち盛り！';
    return 'ヒョロガリ！';
  }

  // 特化型：最高値の部位＋その値でサフィックス
  const top = entries.reduce((a, b) => a.val >= b.val ? a : b);
  let suffix;
  if (top.val >= 90)      suffix = 'の神！';
  else if (top.val >= 80) suffix = 'ゴリラ！';
  else if (top.val >= 70) suffix = 'パンパン！';
  else if (top.val >= 60) suffix = '番長！';
  else if (top.val >= 50) suffix = '自慢！';
  else return 'ヒョロガリ！';
  return top.prefix + suffix;
}

function generateResultComment(s, total) {
  const sorted = [
    { val: s.chest, name: 'むね' },
    { val: s.arm,   name: 'うで' },
    { val: s.abs,   name: 'はら' },
    { val: s.leg,   name: 'あし' },
  ].sort((a, b) => b.val - a.val);
  const balanced = (sorted[0].val - sorted[3].val) <= 15;
  if (total >= 320) return '完璧なボディを手に入れた！大会での活躍が楽しみだ！';
  if (total >= 240) return balanced ? '全身バランスよく鍛えられた！ステージ映えするぞ！' : `特に${sorted[0].name}が際立つ！個性的なボディだ！`;
  if (total >= 160) return balanced ? 'しっかりとした体になってきた！あと一息だ！' : `${sorted[0].name}の成長が著しい！他の部位も伸ばそう！`;
  if (total >= 80)  return 'まだまだ伸びしろがある！次回はもっと鍛えよう！';
  return 'トレーニングの第一歩を踏み出した！次はもっとやり込もう！';
}

let _levelUpActive = false;

function showLevelUpScreen(prevLv, lv, prevMaxLife) {
  if (_levelUpActive) return;
  _levelUpActive = true;
  state.levelUpFreeze = true;
  setMenuButtonsDisabled(true);

  // SVG内エフェクトを非表示
  setCharEffectsVisible(false);

  // 画面全体を暗転
  const overlay = document.createElement('div');
  overlay.className = 'levelup-overlay';
  document.body.appendChild(overlay);

  // 人体モデルとライフバーをオーバーレイより前面に
  charWrap.style.zIndex = '501';
  const charBottomRow = document.querySelector('.char-bottom-row');
  charBottomRow.style.zIndex = '501';

  // バナーを char-stats の中央に円形で fixed 配置
  const statsRect = document.querySelector('.char-stats').getBoundingClientRect();
  const circleSize = Math.min(statsRect.width, statsRect.height) * 1.05;
  const cx = statsRect.left + statsRect.width / 2;
  const cy = statsRect.top + statsRect.height / 2;
  const banner = document.createElement('div');
  banner.className = 'levelup-banner';
  banner.style.cssText = `position:fixed; left:${(cx - circleSize/2).toFixed(0)}px; top:${(cy - circleSize/2).toFixed(0)}px; width:${circleSize.toFixed(0)}px; height:${circleSize.toFixed(0)}px; z-index:502;`;
  banner.innerHTML = `
    <div class="levelup-main">Level Up !!</div>
    <div class="levelup-lv">${prevLv} ⇒ ${lv}</div>`;
  document.body.appendChild(banner);

  // バーを現在の状態（旧 maxLife 基準）で固定表示
  const fromBarPct  = prevMaxLife / 10;
  const toBarPct    = state.maxLife / 10;
  const fromBarFill = Math.min(100, state.life / prevMaxLife * 100);
  const toBarFill   = Math.min(100, state.life / state.maxLife * 100); // life は変わらず最大値だけ増加
  // transition を切ってから即時リセット（CSS アニメが干渉しないように）
  lifeBarWrap.style.transition = 'none';
  lifeBar.style.transition = 'none';
  lifeBarWrap.style.width = fromBarPct + '%';
  lifeBar.style.width = fromBarFill.toFixed(2) + '%';

  // バナー表示後 0.5s待ち → 筋肉膨らむ → 0.5s待ち → ライフバー伸びる → 0.5s待ち → フェードアウト
  setTimeout(() => {
    animateMuscleGrow(500, () => {
      // 筋肉アニメ完了後、0.5秒待ってからライフバーを伸ばす
      setTimeout(() => {
        animateLifeBarWidth(fromBarPct, toBarPct, fromBarFill, toBarFill, 500);
        setTimeout(() => {
          updateLifeBar();
          // ライフバー完了後、0.5秒待ってからフェードアウト
          setTimeout(() => {
            banner.classList.add('burst');
            setTimeout(() => {
              overlay.remove();
              banner.remove();
              charWrap.style.zIndex = '';
              charBottomRow.style.zIndex = '';
              setCharEffectsVisible(true);
              setMenuButtonsDisabled(false);
              state.levelUpFreeze = false;
              _levelUpActive = false;
            }, 450);
          }, 500);
        }, 500); // ライフバーアニメーション完了待ち (500ms)
      }, 500);   // 筋肉とライフバーの間の待機 (500ms)
    });
  }, 500);
}

function updateLevel() {
  const lv = calcLevel();
  document.getElementById('levelNum').textContent = lv;
  const prevMaxLife = state.maxLife;
  state.maxLife = Math.min(1000, 300 + (lv - 1) * 140);
  if (lv > _prevLevel) {
    // level-up: 即座に freeze してタイマー干渉を防ぐ。バー更新はアニメーション側に任せる
    state.levelUpFreeze = true;
    const fromLv = _prevLevel;
    _prevLevel = lv;
    setTimeout(() => showLevelUpScreen(fromLv, lv, prevMaxLife), 600);
  } else {
    state.life = Math.min(state.life, state.maxLife);
    updateLifeBar();
    _prevLevel = lv;
  }

  // 二つ名を更新
  const titleEl = document.getElementById('charTitle');
  if (titleEl) {
    const newTitle = generateTitle();
    if (titleEl.textContent !== newTitle) {
      titleEl.textContent = newTitle;
    }
  }
}

function selectMenu(id) {
  if (state.gameOver || state.levelUpFreeze) return;
  if (state.resting) { showPopup('💤 休憩中！ライフ回復を待って！'); return; }
  if (state.life <= 0) { showPopup('❤️ ライフがありません！'); return; }
  if (state.activeMenu === id) { stopTraining(); return; }

  stopSleepEffect();
  stopTraining(true);
  state.activeMenu = id;
  const menu = MENUS.find(m => m.id === id);

  document.querySelectorAll('.menu-btn').forEach(b => { b.classList.remove('active'); b.classList.add('disabled'); });
  document.getElementById('btn-' + id).classList.add('active');
  document.getElementById('btn-' + id).classList.remove('disabled');

  speechBubble.className = 'speech-bubble';
  speechBubble.textContent = START_PHRASES[id];
  setTimeout(() => { if (state.activeMenu === id) startSpeechLoop(SPEECHES[id]); }, 2000);
  setStatusText(STATUS_TEXTS[id], 'training');
  addLog(`🏋️ ${menu.name} スタート！`, true);
  updateCharacter(); // show sweat immediately

  state.ticker = setInterval(() => doRep(menu), menu.tickMs);
}

function doRep(menu) {
  if (state.levelUpFreeze) return;
  if (state.life <= 0) { startResting(); return; }
  const mainStat = state.stats[menu.gains[0].stat];
  const bonus = Math.floor(mainStat / 30);
  const lifeMin = (1 + bonus) * 10;
  const lifeMax = (3 + bonus) * 10;
  const lifeCost = lifeMin + Math.floor(Math.random() * (lifeMax - lifeMin + 1));
  state.life = Math.max(0, state.life - lifeCost);

  const lv = calcLevel();
  const levelBoost = 1 + Math.min(lv - 1, 9) / 9; // Lv1→×1.0、Lv10以上→×2.0

  const prevFloor = {};
  ['chest', 'arm', 'abs', 'leg'].forEach(stat => { prevFloor[stat] = Math.floor(state.stats[stat]); });

  menu.gains.forEach(g => {
    const cur = state.stats[g.stat];
    const statDecay = Math.max(0.20, 1.0 - 0.8 * cur / 100);
    const cond = state.conditions[g.stat];
    const condMod = cond === 'good' ? 2.0 : cond === 'bad' ? 0.5 : 1.0;
    const base = g.min + Math.random() * (g.max - g.min);
    const amount = parseFloat((base * statDecay * levelBoost * condMod).toFixed(1));
    state.stats[g.stat] = parseFloat(Math.min(MAX_STAT_VAL, cur + amount).toFixed(1));
  });

  ['chest', 'arm', 'abs', 'leg'].forEach(stat => {
    const extra = parseFloat((Math.random() * 0.3).toFixed(1));
    state.stats[stat] = parseFloat(Math.min(MAX_STAT_VAL, state.stats[stat] + extra).toFixed(1));
  });

  // どのstatが好調/不調状態だったかを記録
  const goodGain = { chest:false, arm:false, abs:false, leg:false };
  const badGain  = { chest:false, arm:false, abs:false, leg:false };
  menu.gains.forEach(g => {
    if (state.conditions[g.stat] === 'good') goodGain[g.stat] = true;
    if (state.conditions[g.stat] === 'bad')  badGain[g.stat]  = true;
  });

  ['chest', 'arm', 'abs', 'leg'].forEach(stat => {
    const diff = Math.floor(state.stats[stat]) - prevFloor[stat];
    if (diff >= 1) spawnStatFloat('+' + diff, stat, goodGain[stat], badGain[stat]);
  });

  state.totalReps += 1;
  state.menuReps[menu.id] = (state.menuReps[menu.id] || 0) + 1;
  updateLifeBar();
  updateStatBars();
  if (state.life <= 0) startResting();
}

// ============================================================
// SLEEP EFFECT (💤)
// ============================================================
let _sleepTimers = [];

function startSleepEffect(emoji = '💤') {
  stopSleepEffect();
  const g = document.getElementById('sleep-effect');
  if (!g) return;

  function spawnZzz(delay) {
    const tid = setTimeout(() => {
      if (state.activeMenu || state.gameOver) return;
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      el.textContent = emoji;
      el.setAttribute('font-size', '20');
      el.setAttribute('text-anchor', 'middle');
      el.setAttribute('x', (72 + Math.random() * 8).toFixed(1));
      el.setAttribute('y', '18');
      el.style.opacity = '0';
      g.appendChild(el);

      const duration = 2200;
      const rise = 22;
      let startTs = null;
      function tick(ts) {
        if (!startTs) startTs = ts;
        const p = Math.min((ts - startTs) / duration, 1);
        el.setAttribute('y', (18 - rise * p).toFixed(1));
        const op = p < 0.15 ? p / 0.15 : p < 0.65 ? 1 : 1 - (p - 0.65) / 0.35;
        el.style.opacity = Math.max(0, op).toFixed(3);
        if (p < 1) {
          requestAnimationFrame(tick);
        } else {
          el.remove();
          if (!state.activeMenu && !state.gameOver) spawnZzz(400 + Math.random() * 600);
        }
      }
      requestAnimationFrame(tick);
    }, delay);
    _sleepTimers.push(tid);
  }

  spawnZzz(0);
  spawnZzz(1000);
}

function stopSleepEffect() {
  _sleepTimers.forEach(t => clearTimeout(t));
  _sleepTimers = [];
  stopDizzyEffect();
  const g = document.getElementById('sleep-effect');
  if (g) g.innerHTML = '';
}

// ============================================================
// DIZZY EFFECT (💫 around head)
// ============================================================
let _dizzyRAF = null;

function startDizzyEffect() {
  stopSleepEffect();
  const g = document.getElementById('sleep-effect');
  if (!g) return;

  const cx = 50, cy = 12, orx = 24, ory = 8;
  const emojis = ['✨', '🐤'];
  const els = [];

  for (let i = 0; i < emojis.length; i++) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    el.textContent = emojis[i];
    el.setAttribute('font-size', '13');
    el.setAttribute('text-anchor', 'middle');
    el.setAttribute('dominant-baseline', 'middle');
    g.appendChild(el);
    els.push(el);
  }

  let startTs = null;
  const speed = 2.5;

  function tick(ts) {
    if (!startTs) startTs = ts;
    const angle = (ts - startTs) / 1000 * speed;
    els.forEach((el, i) => {
      const a = angle + i * (2 * Math.PI / emojis.length);
      el.setAttribute('x', (cx + orx * Math.cos(a)).toFixed(1));
      el.setAttribute('y', (cy + ory * Math.sin(a)).toFixed(1));
    });
    _dizzyRAF = requestAnimationFrame(tick);
  }

  _dizzyRAF = requestAnimationFrame(tick);
}

function stopDizzyEffect() {
  if (_dizzyRAF) { cancelAnimationFrame(_dizzyRAF); _dizzyRAF = null; }
}

// ============================================================
// MANUAL REST
// ============================================================
function manualRest() {
  if (state.gameOver || state.levelUpFreeze || state.resting || !state.activeMenu) return;
  stopTraining();
}

// ============================================================
// STOP
// ============================================================
function stopTraining(silent = false) {
  if (state.ticker) clearInterval(state.ticker);
  state.ticker = null;
  state.activeMenu = null;
  stopSpeechLoop();
  updateCharacter(); // hide sweat
  // activeクラスは常に解除（silent=trueでもライフ切れ時に押しっぱなし見えないように）
  document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
  if (!silent) {
    speechBubble.className = 'speech-bubble resting';
    speechBubble.textContent = SPEECHES.finish[Math.floor(Math.random() * SPEECHES.finish.length)];
    setStatusText('休憩中…', 'resting');
    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('disabled'));
    addLog('⏹ トレーニング停止');
    startPassiveRegen();
    startSleepEffect();
    setTimeout(() => { if (!state.activeMenu && !state.gameOver) startSpeechLoop(SPEECHES.rest, true); }, 2000);
  }
}

// 待機中のゆるやかなライフ回復
function startPassiveRegen() {
  if (state.passiveTicker) return;
  if (state.life >= state.maxLife) return;
  state.passiveTicker = setInterval(() => {
    // トレーニング中 or 休憩中 or ゲームオーバーなら停止
    if (state.activeMenu || state.resting || state.gameOver || state.levelUpFreeze) {
      clearInterval(state.passiveTicker);
      state.passiveTicker = null;
      return;
    }
    state.life = Math.min(state.maxLife, state.life + state.maxLife * 0.10);
    updateLifeBar();
    if (state.life >= state.maxLife) {
      clearInterval(state.passiveTicker);
      state.passiveTicker = null;
      stopSleepEffect();
      setStatusText('待機中', 'waiting');
      startSpeechLoop(SPEECHES.ready);
    }
  }, 500);
}

// ============================================================
// REST
// ============================================================
function startResting() {
  stopTraining(true);
  state.resting = true;
  document.querySelectorAll('.menu-btn').forEach(b => {
    b.classList.remove('active');
    b.classList.add('disabled');
  });
  speechBubble.className = 'speech-bubble resting';
  speechBubble.textContent = 'ちょっと休憩…';
  setStatusText('ダウン！回復中…', 'down');
  state.down = true;
  addLog('😴 ライフ切れ！休憩に入ります…', true);
  showPopup('😴 ライフ切れ！休憩します');
  startDizzyEffect();
  setTimeout(() => { if (state.resting) startSpeechLoop(SPEECHES.down, true); }, 2000);

  state.restTicker = setInterval(() => {
    if (state.levelUpFreeze) return;
    state.life = Math.min(state.maxLife, state.life + state.maxLife * 0.05);
    updateLifeBar();
    if (state.life >= state.maxLife) {
      state.life = state.maxLife;
      state.resting = false;
      state.down = false;
      updateLifeBar();
      stopSleepEffect();
      clearInterval(state.restTicker);
      state.restTicker = null;
      setStatusText('待機中', 'waiting');
      document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('disabled'));
      addLog('✅ ライフ回復！もう一回！', true);
      showPopup('✅ ライフ回復！また頑張ろう！');
      startSpeechLoop(SPEECHES.ready);
    }
  }, 500);
}

// ============================================================
// CONDITION SYSTEM (好調/普通/不調)
// ============================================================
const CATEGORIES = ['chest', 'arm', 'abs', 'leg'];

const STATUS_TEXTS = {
  bench:    'ベンチプレス中！',
  dumbbell: 'ダンベルリフト中！',
  plank:    'プランク中！',
  squat:    'スクワット中！',
};
function setStatusText(text, mode = 'resting') {
  const el = document.getElementById('charStatus');
  el.textContent = text;
  el.className = 'char-status ' + mode;
}

// 各カテゴリの🌀出現ゾーン（SVG座標） [cx, cy, rx, ry, count]
const CAT_ZONES = {
  chest: { areas: [[50, 64, 22, 12]], count: 2 },
  arm:   { areas: [[8,  95, 8,  20], [92, 95, 8, 20]], count: 2 },
  abs:   { areas: [[50, 91, 12, 14]], count: 2 },
  leg:   { areas: [[35, 152, 10, 24], [65, 152, 10, 24]], count: 2 },
};

function makeDullElements(cat) {
  const g = document.getElementById('fx-' + cat + '-bad');
  if (!g) return;
  if (g._dullTimers) g._dullTimers.forEach(t => clearTimeout(t));
  g._dullTimers = [];
  g.innerHTML = '';

  const zone = CAT_ZONES[cat];

  zone.areas.forEach((area, ai) => {
    for (let si = 0; si < 1; si++) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    el.setAttribute('font-size', '18');
    el.setAttribute('text-anchor', 'middle');
    el.setAttribute('x', '0');
    el.setAttribute('y', '0');
    el.style.opacity = '0';
    el.textContent = '🌀';
    g.appendChild(el);

    function randomPos(elem) {
      const [cx, cy, rx, ry] = area;
      elem.setAttribute('x', (cx + (Math.random() * 2 - 1) * rx).toFixed(1));
      elem.setAttribute('y', (cy + (Math.random() * 2 - 1) * ry).toFixed(1));
    }

    function animate(elem, fromOp, toOp, dur, onDone) {
      let start = null;
      function tick(ts) {
        if (!start) start = ts;
        const p = Math.min((ts - start) / dur, 1);
        elem.style.opacity = (fromOp + (toOp - fromOp) * p).toFixed(3);
        if (p < 1) requestAnimationFrame(tick);
        else onDone();
      }
      requestAnimationFrame(tick);
    }

    (function makeLoop(elem) {
      function cycle() {
        if (document.getElementById('fx-' + cat + '-bad') !== g) return;
        randomPos(elem);
        animate(elem, 0, 0.38, 500, () => {
          animate(elem, 0.38, 0.38, 800, () => {
            animate(elem, 0.38, 0, 500, () => {
              const tid = setTimeout(cycle, 200);
              g._dullTimers.push(tid);
            });
          });
        });
      }
      const tid = setTimeout(cycle, (ai * 2 + si) * 900);
      g._dullTimers.push(tid);
    })(el);
    }
  });
}

function rollCondition() {
  const lifeRatio = state.life / state.maxLife;
  // ライフ20%以下→0%、80%以上→30%、その間を線形補間
  const t = Math.max(0, Math.min(1, (lifeRatio - 0.2) / 0.6));
  const goodProb = t * 0.30;        // 0%〜30%
  const badProb  = 0.80;            // テスト中: 不調を80%で発生
  // normal は残り全部
  const r = Math.random();
  if (r < goodProb) return 'good';
  if (r < goodProb + badProb) return 'bad';
  return 'normal';
}

// ⭐ 好調エフェクト
function makeGoodElements(cat) {
  const g = document.getElementById('fx-' + cat + '-good');
  if (!g) return;
  if (g._goodTimers) g._goodTimers.forEach(t => clearTimeout(t));
  g._goodTimers = [];
  g.innerHTML = '';

  const zone = CAT_ZONES[cat];

  const GOOD_EMOJIS = ['✨'];
  zone.areas.forEach((area, ai) => {
    // 各エリアに3つのキラキラを生成
    for (let si = 0; si < 1; si++) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      el.setAttribute('font-size', '18');
      el.setAttribute('text-anchor', 'middle');
      el.setAttribute('x', '0');
      el.setAttribute('y', '0');
      el.style.opacity = '0';
      el.textContent = GOOD_EMOJIS[si % GOOD_EMOJIS.length];
      g.appendChild(el);

      function randomPos(elem, a) {
        const [cx, cy, rx, ry] = a;
        elem.setAttribute('x', (cx + (Math.random() * 2 - 1) * rx).toFixed(1));
        elem.setAttribute('y', (cy + (Math.random() * 2 - 1) * ry).toFixed(1));
      }

      function animate(elem, fromOp, toOp, dur, onDone) {
        let start = null;
        function tick(ts) {
          if (!start) start = ts;
          const p = Math.min((ts - start) / dur, 1);
          elem.style.opacity = (fromOp + (toOp - fromOp) * p).toFixed(3);
          if (p < 1) requestAnimationFrame(tick);
          else onDone();
        }
        requestAnimationFrame(tick);
      }

      (function makeLoop(elem) {
        function cycle() {
          if (document.getElementById('fx-' + cat + '-good') !== g) return;
          randomPos(elem, area);
          // フェードイン → フェードアウト → 待機 → 繰り返し
          animate(elem, 0, 1, 300, () => {
            animate(elem, 1, 0, 500, () => {
              const tid = setTimeout(cycle, 300 + Math.random() * 500);
              g._goodTimers.push(tid);
            });
          });
        }
        const tid = setTimeout(cycle, (ai * 3 + si) * 300);
        g._goodTimers.push(tid);
      })(el);
    }
  });
}

function stopGoodEffect(cat) {
  const g = document.getElementById('fx-' + cat + '-good');
  if (!g) return;
  if (g._goodTimers) g._goodTimers.forEach(t => clearTimeout(t));
  g._goodTimers = [];
  g.innerHTML = '';
  g.setAttribute('opacity', '0');
}

function applyConditionEffects() {
  CATEGORIES.forEach(cat => {
    const cond = state.conditions[cat];
    const badEl  = document.getElementById('fx-' + cat + '-bad');
    const goodEl = document.getElementById('fx-' + cat + '-good');

    if (cond === 'good') {
      if (goodEl) {
        goodEl.setAttribute('opacity', '1');
        makeGoodElements(cat);
      }
    } else {
      stopGoodEffect(cat);
    }

    if (cond === 'bad') {
      if (badEl) {
        badEl.setAttribute('opacity', '1');
        makeDullElements(cat);
      }
    } else {
      if (badEl) {
        badEl.setAttribute('opacity', '0');
        if (badEl._dullTimers) badEl._dullTimers.forEach(t => clearTimeout(t));
        badEl._dullTimers = [];
        badEl.innerHTML = '';
      }
    }
  });
}

function rollCondition() {
  const lifeRatio = state.life / state.maxLife;
  const t = Math.max(0, Math.min(1, (lifeRatio - 0.2) / 0.6));
  const goodProb = t * 0.40;
  const badProb  = 0.80;  // テスト中: 不調を80%で発生
  const r = Math.random();
  if (r < goodProb) return 'good';
  if (r < goodProb + badProb) return 'bad';
  return 'normal';
}

function scheduleNextConditionChange() {
  const delay = 3000 + Math.random() * 3000;
  state.conditionTicker = setTimeout(() => {
    if (state.gameOver) return;

    // 現在不調な部位
    const currentBadCat = CATEGORIES.find(c => state.conditions[c] === 'bad');

    // 不調の処理
    if (!currentBadCat && Math.random() < 0.20) {
      // 不調を1箇所だけ新規発生
      const newBadCat = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
      if (state.conditions[newBadCat] === 'good') stopGoodEffect(newBadCat);
      state.conditions[newBadCat] = 'bad';
    } else if (currentBadCat && Math.random() < 0.5) {
      // 既存の不調を解除
      state.conditions[currentBadCat] = rollCondition();
    }

    // 好調部位を50%でいったん普通に戻してからローテーション
    const goodCats = CATEGORIES.filter(c => state.conditions[c] === 'good');
    if (goodCats.length > 0 && Math.random() < 0.5) {
      const resetCat = goodCats[Math.floor(Math.random() * goodCats.length)];
      stopGoodEffect(resetCat);
      state.conditions[resetCat] = 'normal';
    }

    // 不調でない部位から1つ振り直し（既に不調がある場合はbadにしない）
    const nonBadCats = CATEGORIES.filter(c => state.conditions[c] !== 'bad');
    const target = nonBadCats[Math.floor(Math.random() * nonBadCats.length)];
    if (target) {
      const newCond = rollCondition();
      const stillBad = CATEGORIES.find(c => state.conditions[c] === 'bad');
      state.conditions[target] = (newCond === 'bad' && stillBad) ? 'normal' : newCond;
    }

    // 常に最低1箇所は好調を保証
    const goodCats2 = CATEGORIES.filter(c => state.conditions[c] === 'good');
    if (goodCats2.length === 0) {
      const nonBadCats2 = CATEGORIES.filter(c => state.conditions[c] !== 'bad');
      const forceGood = nonBadCats2[Math.floor(Math.random() * nonBadCats2.length)];
      if (forceGood) state.conditions[forceGood] = 'good';
    }

    applyConditionEffects();
    scheduleNextConditionChange();
  }, delay);
}

function startConditionSystem() {
  // 初期: 最低1箇所を好調に、残りnormal
  CATEGORIES.forEach(cat => { state.conditions[cat] = 'normal'; });
  const firstGood = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  state.conditions[firstGood] = 'good';
  applyConditionEffects();
  scheduleNextConditionChange();
}

// ============================================================
// GAME COUNTDOWN (1秒 = ゲーム内1日)
// ============================================================
function startGameTimer() {
  state.gameTicker = setInterval(() => {
    if (state.gameOver || state.levelUpFreeze) return;
    state.daysLeft -= 1;
    countdownDaysEl.textContent = state.daysLeft;
    if (state.daysLeft <= 0) {
      state.daysLeft = 0;
      // 「大会まで残り0日！」ではなく「大会当日！」に差し替え
      document.getElementById('countdownText').textContent = '大会当日！';
      gameEnd();
    }
  }, 1000);
}

function gameEnd() {
  state.gameOver = true;
  if (state.ticker)        { clearInterval(state.ticker);        state.ticker        = null; }
  if (state.restTicker)    { clearInterval(state.restTicker);    state.restTicker    = null; }
  if (state.passiveTicker) { clearInterval(state.passiveTicker); state.passiveTicker = null; }
  if (state.gameTicker)    { clearInterval(state.gameTicker);    state.gameTicker    = null; }
  if (state.conditionTicker) { clearTimeout(state.conditionTicker); state.conditionTicker = null; }
  CATEGORIES.forEach(cat => stopGoodEffect(cat));
  CATEGORIES.forEach(cat => {
    const badEl = document.getElementById('fx-' + cat + '-bad');
    if (badEl) {
      badEl.setAttribute('opacity', '0');
      if (badEl._dullTimers) badEl._dullTimers.forEach(t => clearTimeout(t));
      badEl._dullTimers = [];
      badEl.innerHTML = '';
    }
    state.conditions[cat] = 'normal';
  });
  state.activeMenu = null;
  updateCharacter();
  stopSleepEffect();
  stopDizzyEffect();
  stopSpeechLoop();
  document.querySelectorAll('.menu-btn').forEach(b => {
    b.classList.remove('active');
    b.classList.add('disabled');
  });
  setStatusText('結果発表！', 'gameend');
  speechBubble.className = 'speech-bubble gameend';
  speechBubble.textContent = '結果発表！';
  showGameEndScreen();
}

function showGameEndScreen() {
  state.levelUpFreeze = true;
  setMenuButtonsDisabled(true);
  setCharEffectsVisible(false);

  const overlay = document.createElement('div');
  overlay.className = 'levelup-overlay';
  document.body.appendChild(overlay);

  charWrap.style.zIndex = '501';
  const charBottomRow = document.querySelector('.char-bottom-row');
  charBottomRow.style.zIndex = '501';

  const statsRect = document.querySelector('.char-stats').getBoundingClientRect();
  const circleSize = Math.min(statsRect.width, statsRect.height) * 1.05;
  const cx = statsRect.left + statsRect.width / 2;
  const cy = statsRect.top + statsRect.height / 2;
  const banner = document.createElement('div');
  banner.className = 'levelup-banner gameend';
  banner.style.cssText = `position:fixed; left:${(cx - circleSize/2).toFixed(0)}px; top:${(cy - circleSize/2).toFixed(0)}px; width:${circleSize.toFixed(0)}px; height:${circleSize.toFixed(0)}px; z-index:502;`;
  banner.innerHTML = `
    <div class="levelup-main">トレーニング</div>
    <div class="levelup-lv">終了!!</div>`;
  document.body.appendChild(banner);

  // 0.5s 待ってから筋肉をアニメーション → 0.5s 待ち → フェードアウト
  setTimeout(() => {
    animateMuscleGrow(500, () => {
      setTimeout(() => {
        banner.classList.add('burst');
        setTimeout(() => {
          overlay.remove();
          banner.remove();
          charWrap.style.zIndex = '';
          charBottomRow.style.zIndex = '';
          setCharEffectsVisible(true);
          speechBubble.className = 'speech-bubble';
          speechBubble.textContent = SPEECHES.finish[Math.floor(Math.random() * SPEECHES.finish.length)];
          showResultCard();
        }, 450);
      }, 500);
    });
  }, 500);
}

function startCountdown(onDone) {
  // gameendバナーと同じく .char-stats エリアに円形で表示
  const statsRect = document.querySelector('.char-stats').getBoundingClientRect();
  const circleSize = Math.min(statsRect.width, statsRect.height) * 1.05;
  const cx = statsRect.left + statsRect.width / 2;
  const cy = statsRect.top + statsRect.height / 2;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:501; pointer-events:none;';
  document.body.appendChild(overlay);

  const steps = ['3', '2', '1', 'Start !!'];
  let idx = 0;

  function showStep() {
    const banner = document.createElement('div');
    banner.className = 'levelup-banner gameend';
    banner.style.cssText = `position:fixed; left:${(cx - circleSize/2).toFixed(0)}px; top:${(cy - circleSize/2).toFixed(0)}px; width:${circleSize.toFixed(0)}px; height:${circleSize.toFixed(0)}px; z-index:502;`;
    const isLast = idx === steps.length - 1;
    banner.innerHTML = `<div class="levelup-lv" style="font-size:${isLast ? '1.6rem' : '2.4rem'}">${steps[idx]}</div>`;
    document.body.appendChild(banner);
    setTimeout(() => {
      banner.remove();
      idx++;
      if (idx < steps.length) {
        showStep();
      } else {
        overlay.remove();
        onDone && onDone();
      }
    }, isLast ? 1000 : 500);
  }
  showStep();
}

function beginGame() {
  // タイトル画面を解除
  document.body.classList.remove('title-active');
  document.getElementById('menuCard').classList.remove('title-disabled');
  state.gameStarted = true;

  startGameTimer();

});
